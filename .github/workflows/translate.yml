name: Translate articles to Dutch

on:
  push:
    branches: [main]
    paths:
      - 'src/content/articles/*.md'

permissions:
  contents: write

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/translate.mjs
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      - name: Commit translations
        run: |
          git config user.name "translate-bot"
          git config user.email "translate-bot[bot]@users.noreply.github.com"
          git add src/content/articles/
          if git diff --cached --quiet; then
            echo "No new translations."
          else
            git commit -m "auto: translate articles to Dutch"
            git push
          fi
