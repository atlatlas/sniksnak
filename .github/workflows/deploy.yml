name: Translate and deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/content/articles/**'
      - 'src/**'
      - 'public/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  translate-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/translate.mjs
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      - name: Commit translations
        run: |
          git config user.name "translate-bot"
          git config user.email "translate-bot[bot]@users.noreply.github.com"
          git add src/content/articles/
          if git diff --cached --quiet; then
            echo "No new translations."
          else
            git commit -m "auto: translate articles to Dutch"
            git push
          fi
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deploy
        uses: actions/deploy-pages@v4
