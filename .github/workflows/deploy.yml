name: Translate and deploy

on:
  push:
    branches: [main]
    paths:
      - 'src/content/articles/**'
      - 'src/**'
      - 'public/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  translate-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: node scripts/translate.mjs
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
      - name: Commit translations
        run: |
          git config user.name "translate-bot"
          git config user.email "translate-bot[bot]@users.noreply.github.com"
          git add src/content/articles/
          if git diff --cached --quiet; then
            echo "No new translations."
          else
            git commit -m "auto: translate articles to Dutch"
            git push
          fi
      - run: npm run build
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 9b16a5377c884a7e41ea64ec3f425503
          command: pages deploy dist --project-name=sniksnak --branch=main
