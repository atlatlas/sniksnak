backend:
  name: github
  repo: atlatlas/sniksnak
  branch: main

media_folder: public/images
public_folder: /images

locale: nl

collections:
  - name: articles
    label: Artikels
    folder: src/content/articles
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    path: "{{slug}}.md"
    summary: "{{title}}"
    fields:
      - { name: title, label: Titel, widget: string }
      - name: category
        label: Rubriek
        widget: select
        options:
          - { label: Binnenland, value: binnenland }
          - { label: Buitenland, value: buitenland }
          - { label: Tech, value: tech }
          - { label: Sport, value: sport }
          - { label: Column, value: column }
      - { name: date, label: Datum, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { name: author, label: Auteur, widget: string }
      - { name: excerpt, label: Samenvatting, widget: text }
      - name: image
        label: Afbeelding
        widget: image
        required: false
        hint: Optioneel. Upload een afbeelding of voeg een URL in.
      - { name: featured, label: Uitgelicht (voorpagina hero)", widget: boolean, default: false }
      - { name: readTime, label: Leestijd (minuten)", widget: number, required: false, value_type: int, min: 1, max: 30 }
      - { name: body, label: Artikeltekst, widget: markdown }
