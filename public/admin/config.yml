backend:
  name: github
  repo: atlatlas/sniksnak
  branch: main
  base_url: https://api.netlify.com
  auth_endpoint: auth

media_folder: public/images
public_folder: /images

locale: en

collections:
  - name: articles
    label: Articles
    folder: src/content/articles
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    path: "{{slug}}.md"
    summary: "{{title}} ({{lang}})"
    fields:
      - { name: title, label: Title, widget: string }
      - name: lang
        label: Language
        widget: select
        options:
          - { label: English, value: en }
          - { label: Dutch, value: nl }
        default: en
      - name: category
        label: Category
        widget: select
        options:
          - { label: Domestic, value: binnenland }
          - { label: World, value: buitenland }
          - { label: Tech, value: tech }
          - { label: Sports, value: sport }
          - { label: Column, value: column }
      - { name: date, label: Date, widget: datetime, format: "YYYY-MM-DDTHH:mm:ssZ" }
      - { name: author, label: Author, widget: string }
      - { name: excerpt, label: Excerpt, widget: text }
      - name: image
        label: Image
        widget: image
        required: false
        hint: Optional. Upload an image or paste a URL.
      - { name: featured, label: "Featured (homepage hero)", widget: boolean, default: false }
      - { name: readTime, label: "Read time (minutes)", widget: number, required: false, value_type: int, min: 1, max: 30 }
      - { name: body, label: Article body, widget: markdown }
